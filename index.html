    const getMoonPhase = (date) => {
      let year = date.getFullYear();
      let month = date.getMonth() + 1;
      let day = date.getDate();
      if (month < 3) { year--; month += 12; }
      ++month;
      let c = 365.25 * year;
      let e = 30.6 * month;
      let jd = c + e + day - 694039.09;
      jd /= 29.5305882;
      let b = Math.floor(jd);
      jd -= b;
      let b2 = Math.round(jd * 8);
      if (b2 >= 8) b2 = 0;
      const phases = ['new', 'waxingCrescent', 'firstQuarter', 'waxingGibbous', 'full', 'waningGibbous', 'lastQuarter', 'waningCrescent'];
      const emojis = ['🌑', '🌒', '🌓', '🌔', '🌕', '🌖', '🌗', '🌘'];
      return { key: phases[b2], emoji: emojis[b2] };
    };

    function App() {
      const [lang, setLang] = useState('tr');
      const [theme, setTheme] = useState('dark');
      const [location, setLocation] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [prayerData, setPrayerData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [currentTime, setCurrentTime] = useState(new Date());
      const [notifPerm, setNotifPerm] = useState('default');
      const [notifiedPrayers, setNotifiedPrayers] = useState(new Set());
      const [imageIndex, setImageIndex] = useState(0);

      const t = translations[lang];
      const moonPhase = getMoonPhase(currentTime);

      // Initialize theme and location from local storage
      useEffect(() => {
        const saved = localStorage.getItem('lastLocation');
        if (saved) {
          const { lat, lon, name } = JSON.parse(saved);
          fetchPrayerTimes(lat, lon, name);
        }
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light' || savedTheme === 'dark') {
          setTheme(savedTheme);
        }
        
        if ('Notification' in window) {
          setNotifPerm(Notification.permission);
        }
      }, []);

      // Image rotation timer
      useEffect(() => {
        const imgTimer = setInterval(() => {
          setImageIndex((prev) => (prev + 1) % 2); // Toggle between 0 and 1
        }, 10000); // Change image every 10 seconds
        return () => clearInterval(imgTimer);
      }, []);

      const requestNotification = async () => {
        if ('Notification' in window) {
          const perm = await Notification.requestPermission();
          setNotifPerm(perm);
        } else {
          alert("Tarayıcınız bildirimleri desteklemiyor.");
        }
      };

      const toggleTheme = () => {
        const newTheme = theme === 'dark' ? 'light' : 'dark';
        setTheme(newTheme);
        localStorage.setItem('theme', newTheme);
      };

      // Timer and Notification Logic
      useEffect(() => {
        const timer = setInterval(() => {
          const now = new Date();
          setCurrentTime(now);

          // Check for notifications
          if (prayerData && notifPerm === 'granted') {
            const timezone = prayerData.meta.timezone;
            const tzNowStr = now.toLocaleString("en-US", { timeZone: timezone });
            const tzNow = new Date(tzNowStr);
            
            const currentHour = tzNow.getHours();
            const currentMinute = tzNow.getMinutes();
            const currentSecond = tzNow.getSeconds();

            const prayerKeys = ["Imsak", "Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"];
            
            prayerKeys.forEach(key => {
              const [pHour, pMinute] = prayerData.timings[key].split(':').map(Number);
              const notifKey = `${prayerData.date.gregorian.date}-${key}`;
              
              if (currentHour === pHour && currentMinute === pMinute && currentSecond === 0) {
                if (!notifiedPrayers.has(notifKey)) {
                  new Notification(t.notifTitle, {
                    body: `${t.prayers[key]} ${t.notifBody}`,
                    icon: 'https://cdn-icons-png.flaticon.com/512/3073/3073986.png' // Mosque icon fallback
                  });
                  setNotifiedPrayers(prev => new Set(prev).add(notifKey));
                }
              }
            });
          }
        }, 1000);
        return () => clearInterval(timer);
      }, [prayerData, notifPerm, notifiedPrayers, t]);

      const fetchPrayerTimes = async (lat, lon, name) => {
        setLoading(true);
        setError('');
        try {
          const timestamp = Math.floor(Date.now() / 1000);
          const res = await fetch(`https://api.aladhan.com/v1/timings/${timestamp}?latitude=${lat}&longitude=${lon}&method=3`);
          const data = await res.json();
          if (data.code === 200) {
            setPrayerData(data.data);
            setLocation({ lat, lon, name });
            localStorage.setItem('lastLocation', JSON.stringify({ lat, lon, name }));
          } else {
            setError(t.error);
          }
        } catch (err) {
          setError(t.error);
        } finally {
          setLoading(false);
        }
      };

      const handleSearch = async () => {
        if (!searchQuery) return;
        setLoading(true);
        setError('');
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(searchQuery)}&format=json&limit=1&accept-language=${lang}`);
          const data = await res.json();
          if (data && data.length > 0) {
            const lat = parseFloat(data[0].lat);
            const lon = parseFloat(data[0].lon);
            const name = data[0].display_name.split(',')[0] + ', ' + data[0].display_name.split(',').pop();
            fetchPrayerTimes(lat, lon, name);
          } else {
            setError(t.locationError);
            setLoading(false);
          }
        } catch (err) {
          setError(t.error);
          setLoading(false);
        }
      };

      const handleAutoLocation = () => {
        if (!navigator.geolocation) {
          setError(t.locationError);
          return;
        }
        setLoading(true);
        setError('');
        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            try {
              const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=${lang}`);
              const data = await res.json();
              const name = data.address?.city || data.address?.town || data.address?.village || data.display_name.split(',')[0];
              fetchPrayerTimes(lat, lon, name);
            } catch {
              fetchPrayerTimes(lat, lon, `${lat.toFixed(4)}, ${lon.toFixed(4)}`);
            }
          },
          (err) => {
            setError(t.locationError);
            setLoading(false);
          },
          { timeout: 10000, maximumAge: 60000, enableHighAccuracy: true }
        );
      };

      let nextPrayer = null;
      let currentPrayer = null;
      let countdownStr = "";
      
      if (prayerData) {
        const timezone = prayerData.meta.timezone;
        const tzNowStr = currentTime.toLocaleString("en-US", { timeZone: timezone });
        const tzNow = new Date(tzNowStr);
        
        const prayerKeys = ["Imsak", "Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"];
        
        const times = prayerKeys.map(key => {
          const [hours, minutes] = prayerData.timings[key].split(':').map(Number);
          const prayerTime = new Date(tzNow);
          prayerTime.setHours(hours, minutes, 0, 0);
          return { key, time: prayerData.timings[key], date: prayerTime };
        });

        // Find current and next prayer
        let foundNext = false;
        for (let i = 0; i < times.length; i++) {
          if (times[i].date.getTime() > tzNow.getTime()) {
            nextPrayer = times[i];
            currentPrayer = i > 0 ? times[i - 1] : times[times.length - 1]; // If before Imsak, current is Isha of prev day
            foundNext = true;
            break;
          }
        }

        if (!foundNext) {
          // After Isha, next is Imsak of tomorrow
          const tomorrowImsak = new Date(times[0].date);
          tomorrowImsak.setDate(tomorrowImsak.getDate() + 1);
          nextPrayer = { ...times[0], date: tomorrowImsak };
          currentPrayer = times[times.length - 1];
        }
        
        if (nextPrayer) {
          const diffMs = nextPrayer.date.getTime() - tzNow.getTime();
          const diffHrs = Math.floor(diffMs / (1000 * 60 * 60));
          const diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
          const diffSecs = Math.floor((diffMs % (1000 * 60)) / 1000);
          
          countdownStr = `${String(diffHrs).padStart(2, '0')}:${String(diffMins).padStart(2, '0')}:${String(diffSecs).padStart(2, '0')}`;
        }
      }

      const containerVariants = {
        hidden: { opacity: 0 },
        show: {
          opacity: 1,
          transition: { staggerChildren: 0.1 }
        }
      };

      const itemVariants = {
        hidden: { opacity: 0, y: 20 },
        show: { opacity: 1, y: 0, transition: { type: "spring", stiffness: 300, damping: 24 } }
      };

      return (
        <div className={`min-h-screen font-sans transition-colors duration-500 relative overflow-hidden ${theme === 'dark' ? 'bg-[#020617] text-slate-100 selection:bg-sky-500/30' : 'bg-slate-50 text-slate-800 selection:bg-sky-500/30'}`}>
          
          {/* Animated Background Gradients */}
          <motion.div 
            animate={{ scale: [1, 1.1, 1], opacity: [0.2, 0.3, 0.2] }}
            transition={{ duration: 8, repeat: Infinity, ease: "easeInOut" }}
            className={`absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full blur-[120px] pointer-events-none ${theme === 'dark' ? 'bg-sky-900/30' : 'bg-sky-300/40'}`}
          />
          <motion.div 
            animate={{ scale: [1, 1.2, 1], opacity: [0.2, 0.4, 0.2] }}
            transition={{ duration: 10, repeat: Infinity, ease: "easeInOut", delay: 1 }}
            className={`absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] rounded-full blur-[120px] pointer-events-none ${theme === 'dark' ? 'bg-indigo-900/30' : 'bg-indigo-300/40'}`}
          />

          <div className="max-w-5xl mx-auto p-4 md:p-8 space-y-6 relative z-10">
            
            {/* Header */}
            <motion.header 
              initial={{ opacity: 0, y: -20 }}
              animate={{ opacity: 1, y: 0 }}
              className={`flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-6 rounded-3xl border backdrop-blur-xl shadow-2xl transition-colors duration-500 ${theme === 'dark' ? 'bg-slate-900/50 border-slate-800/60' : 'bg-white/60 border-slate-200/60'}`}
            >
              <div className="flex items-center gap-4">
                <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-sky-400 to-indigo-500 flex items-center justify-center shadow-lg shadow-sky-500/30">
                  <Moon className="w-7 h-7 text-white" />
                </div>
                <div>
                  <h1 className={`text-2xl font-bold tracking-tight drop-shadow-sm ${theme === 'dark' ? 'text-white' : 'text-slate-900'}`}>
                    {t.title}
                  </h1>
                  <p className={`text-sm mt-0.5 ${theme === 'dark' ? 'text-slate-400' : 'text-slate-500'}`}>{t.subtitle}</p>
                </div>
              </div>
              <div className="flex items-center gap-3 flex-wrap">
                {/* Notification Toggle */}
                <button 
                  onClick={requestNotification}
                  className={`p-2.5 rounded-full transition-colors shadow-inner border ${theme === 'dark' ? 'bg-slate-800/80 border-slate-700/50 text-slate-300 hover:bg-slate-700' : 'bg-slate-100 border-slate-200 text-slate-600 hover:bg-slate-200'}`}
                  title="Notifications"
                >
                  {notifPerm === 'granted' ? <Bell className="w-5 h-5 text-sky-500" /> : <BellOff className="w-5 h-5" />}
                </button>

                {/* Theme Toggle */}
                <button 
                  onClick={toggleTheme}
                  className={`p-2.5 rounded-full transition-colors shadow-inner border ${theme === 'dark' ? 'bg-slate-800/80 border-slate-700/50 text-slate-300 hover:bg-slate-700' : 'bg-slate-100 border-slate-200 text-slate-600 hover:bg-slate-200'}`}
                >
                  {theme === 'dark' ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
                </button>

                {/* Moon Phase Widget */}
                <div className={`flex items-center gap-2 px-4 py-2 rounded-full shadow-inner border ${theme === 'dark' ? 'bg-slate-800/60 border-slate-700/50' : 'bg-slate-100 border-slate-200'}`}>
                  <span className="text-xl">{moonPhase.emoji}</span>
                  <span className={`text-sm font-medium ${theme === 'dark' ? 'text-slate-300' : 'text-slate-700'}`}>
                    {t.moonPhases[moonPhase.key]}
                  </span>
                </div>
                
                <select 
                  value={lang} 
                  onChange={(e) => setLang(e.target.value)}
                  className={`rounded-full px-4 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-sky-500 transition-shadow cursor-pointer shadow-inner border ${theme === 'dark' ? 'bg-slate-800/80 border-slate-700/50 text-white' : 'bg-slate-100 border-slate-200 text-slate-800'}`}
                >
                  <option value="tr">🇹🇷 TR</option>
                  <option value="en">🇬🇧 EN</option>
                  <option value="de">🇩🇪 DE</option>
                </select>
              </div>
            </motion.header>

            {/* Search & Location */}
            <motion.div 
              initial={{ opacity: 0, scale: 0.95 }}
              animate={{ opacity: 1, scale: 1 }}
              transition={{ delay: 0.1 }}
              className={`p-6 rounded-3xl border backdrop-blur-xl shadow-2xl space-y-5 transition-colors duration-500 ${theme === 'dark' ? 'bg-slate-900/50 border-slate-800/60' : 'bg-white/60 border-slate-200/60'}`}
            >
              <div className="flex flex-col md:flex-row gap-3">
                <div className="relative flex-1">
                  <input 
                    type="text" 
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                    placeholder={t.searchPlaceholder}
                    className={`w-full rounded-2xl pl-12 pr-4 py-4 focus:outline-none focus:ring-2 focus:ring-sky-500 transition-all shadow-inner border ${theme === 'dark' ? 'bg-slate-950/60 border-slate-700/50 text-white placeholder:text-slate-500' : 'bg-slate-50 border-slate-300 text-slate-900 placeholder:text-slate-400'}`}
                  />
                  <Search className="absolute left-4 top-4 w-5 h-5 text-slate-400" />
                </div>
                <div className="flex gap-3">
                  <button 
                    onClick={handleSearch}
                    disabled={loading}
                    className="flex-1 md:flex-none bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white px-8 py-4 rounded-2xl font-semibold transition-all disabled:opacity-50 flex items-center justify-center gap-2 shadow-lg shadow-sky-500/25 active:scale-95"
                  >
                    {loading ? <RefreshCw className="w-5 h-5 animate-spin" /> : t.searchBtn}
                  </button>
                  <button 
                    onClick={handleAutoLocation}
                    disabled={loading}
                    className={`flex-1 md:flex-none px-6 py-4 rounded-2xl font-medium transition-all flex items-center justify-center gap-2 active:scale-95 shadow-lg border ${theme === 'dark' ? 'bg-slate-800 hover:bg-slate-700 border-slate-700/50 text-white' : 'bg-white hover:bg-slate-50 border-slate-200 text-slate-800'}`}
                    title={t.useLocation}
                  >
                    <Navigation className="w-5 h-5 text-sky-500" />
                    <span className="md:hidden">{t.useLocation}</span>
                  </button>
                </div>
              </div>
              
              <AnimatePresence>
                {error && (
                  <motion.div 
                    initial={{ opacity: 0, height: 0 }}
                    animate={{ opacity: 1, height: 'auto' }}
                    exit={{ opacity: 0, height: 0 }}
                    className="flex items-center gap-2 text-red-500 text-sm px-4 bg-red-500/10 py-3 rounded-xl border border-red-500/20"
                  >
                    <AlertCircle className="w-4 h-4" />
                    {error}
                  </motion.div>
                )}
              </AnimatePresence>
              
              {location && (
                <motion.div 
                  initial={{ opacity: 0 }}
                  animate={{ opacity: 1 }}
                  className={`flex items-center gap-2 text-sm px-4 py-3 rounded-xl border inline-flex shadow-inner ${theme === 'dark' ? 'bg-emerald-500/10 border-emerald-500/20 text-slate-300' : 'bg-emerald-50 border-emerald-200 text-slate-700'}`}
                >
                  <MapPin className="w-4 h-4 text-emerald-500" />
                  <span className="truncate max-w-[250px] sm:max-w-md font-medium">{location.name}</span>
                </motion.div>
              )}
            </motion.div>

            {/* Main Content */}
            {prayerData && currentPrayer && nextPrayer && (
              <div className="grid lg:grid-cols-12 gap-6">
                
                {/* Left Column: Countdown & Info */}
                <motion.div 
                  initial={{ opacity: 0, x: -20 }}
                  animate={{ opacity: 1, x: 0 }}
                  transition={{ delay: 0.2 }}
                  className="lg:col-span-4 space-y-6"
                >
                  {/* Countdown Card */}
                  <div className={`p-8 rounded-3xl border backdrop-blur-xl flex flex-col items-center justify-center text-center relative overflow-hidden shadow-2xl transition-colors duration-500 ${theme === 'dark' ? 'bg-gradient-to-br from-sky-900/40 to-indigo-900/40 border-sky-500/30' : 'bg-gradient-to-br from-sky-100 to-indigo-100 border-sky-300'}`}>
                    <motion.div 
                      animate={{ opacity: [0.5, 1, 0.5] }}
                      transition={{ duration: 2, repeat: Infinity }}
                      className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-sky-400 via-indigo-400 to-sky-400"
                    />
                    
                    <div className={`inline-flex items-center gap-2 px-4 py-1.5 rounded-full border text-xs font-semibold mb-4 uppercase tracking-wider shadow-inner ${theme === 'dark' ? 'bg-sky-500/15 border-sky-500/30 text-sky-300' : 'bg-white/60 border-sky-200 text-sky-700'}`}>
                      <Clock className="w-3.5 h-3.5" />
                      {t.currently} {t.prayers[currentPrayer.key]} {t.timeFor}
                    </div>
                    
                    <div className={`text-xl sm:text-2xl font-medium mb-2 ${theme === 'dark' ? 'text-slate-300' : 'text-slate-600'}`}>
                      {t.prayers[nextPrayer.key]} {t.timeLeft}
                    </div>
                    
                    <div className={`text-5xl sm:text-6xl font-mono mb-6 font-light tracking-wider ${theme === 'dark' ? 'text-sky-100 drop-shadow-[0_0_15px_rgba(56,189,248,0.5)]' : 'text-sky-700 drop-shadow-sm'}`}>
                      {countdownStr}
                    </div>
                    
                    <div className={`flex flex-col sm:flex-row items-center gap-3 text-sm px-6 py-3 rounded-2xl border shadow-inner w-full justify-center ${theme === 'dark' ? 'bg-slate-950/50 border-slate-800/60 text-slate-300' : 'bg-white/60 border-slate-200 text-slate-700'}`}>
                      <div className="flex items-center gap-2">
                        <Calendar className="w-4 h-4 text-indigo-500" />
                        <span className="font-medium">{prayerData.date.readable}</span>
                      </div>
                      <div className={`hidden sm:block w-1.5 h-1.5 rounded-full ${theme === 'dark' ? 'bg-slate-600' : 'bg-slate-300'}`}></div>
                      <div className={`font-medium ${theme === 'dark' ? 'text-sky-200' : 'text-sky-700'}`}>
                        {prayerData.date.hijri.day} {prayerData.date.hijri.month.en}
                      </div>
                    </div>
                  </div>


                </motion.div>

                {/* Right Column: Prayer Times List */}
                <motion.div 
                  variants={containerVariants}
                  initial="hidden"
                  animate="show"
                  className={`lg:col-span-8 p-6 rounded-3xl border backdrop-blur-xl shadow-2xl transition-colors duration-500 ${theme === 'dark' ? 'bg-slate-900/50 border-slate-800/60' : 'bg-white/60 border-slate-200/60'}`}
                >
                  <div className="space-y-4">
                    {["Imsak", "Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"].map((key) => {
                      const isNext = nextPrayer?.key === key;
                      const details = t.prayerDetails[key];
                      
                      return (
                        <motion.div 
                          variants={itemVariants}
                          key={key}
                          className={`relative overflow-hidden flex flex-col p-5 rounded-2xl transition-all duration-300 ${
                            isNext 
                              ? (theme === 'dark' ? 'border-sky-400/50 shadow-[0_0_30px_rgba(56,189,248,0.2)] scale-[1.02]' : 'border-sky-400 shadow-xl scale-[1.02]')
                              : (theme === 'dark' ? 'bg-slate-950/50 border border-slate-800/50 hover:bg-slate-800/60' : 'bg-white border border-slate-200 hover:bg-slate-50')
                          }`}
                        >
                          {/* Dynamic Background Image for Next Prayer */}
                          {isNext && (
                            <AnimatePresence mode="wait">
                              <motion.div
                                key={imageIndex}
                                initial={{ opacity: 0, scale: 1.05 }}
                                animate={{ opacity: 1, scale: 1 }}
                                exit={{ opacity: 0 }}
                                transition={{ duration: 1 }}
                                className="absolute inset-0 z-0"
                              >
                                <div 
                                  className="absolute inset-0 bg-cover bg-center"
                                  style={{ backgroundImage: `url(${details.images[imageIndex]})` }}
                                />
                                <div className={`absolute inset-0 ${theme === 'dark' ? 'bg-slate-900/80' : 'bg-sky-900/70'}`} />
                              </motion.div>
                            </AnimatePresence>
                          )}

                          {/* Background Emoji Pattern (if not next) */}
                          {!isNext && (
                            <div className="absolute right-[5%] top-[-20%] text-7xl opacity-[0.04] pointer-events-none select-none z-0">
                              {details.emoji.split('')[0]}
                            </div>
                          )}

                          <div className="flex items-center justify-between relative z-10">
                            <div className="flex items-center gap-4">
                              <div className={`w-14 h-14 rounded-xl flex items-center justify-center shadow-inner text-2xl ${
                                isNext ? 'bg-white/20 backdrop-blur-md text-white border border-white/30' : (theme === 'dark' ? 'bg-slate-800/80' : 'bg-slate-100')
                              }`}>
                                {details.emoji}
                              </div>
                              <span className={`text-xl font-medium ${isNext ? 'text-white font-bold drop-shadow-md' : (theme === 'dark' ? 'text-slate-200' : 'text-slate-700')}`}>
                                {t.prayers[key]}
                              </span>
                            </div>
                            <span className={`font-mono text-3xl tracking-tight ${isNext ? 'text-white font-bold drop-shadow-md' : (theme === 'dark' ? 'text-slate-300' : 'text-slate-600')}`}>
                              {prayerData.timings[key]}
                            </span>
                          </div>
                          
                          {/* Verse & Hadith for this prayer */}
                          <div className={`mt-4 pt-4 border-t relative z-10 flex flex-col gap-2 ${isNext ? 'border-white/20' : (theme === 'dark' ? 'border-slate-800' : 'border-slate-100')}`}>
                            <div className={`text-sm italic font-medium ${isNext ? 'text-sky-100 drop-shadow-sm' : (theme === 'dark' ? 'text-sky-300/80' : 'text-sky-700')}`}>
                              📖 {details.verse}
                            </div>
                            <div className={`text-xs italic ${isNext ? 'text-slate-200' : (theme === 'dark' ? 'text-slate-400' : 'text-slate-500')}`}>
                              ✨ {details.hadith}
                            </div>
                          </div>
                        </motion.div>
                      );
                    })}
                  </div>
                </motion.div>

              </div>
            )}

            {/* Footer (Source & Timezone) */}
            {prayerData && (
              <motion.div 
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                transition={{ delay: 0.5 }}
                className={`mt-4 pb-4 text-center text-sm flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-4 ${theme === 'dark' ? 'text-slate-500' : 'text-slate-400'}`}
              >
                <span>{t.source}</span>
                <span className="hidden sm:inline">•</span>
                <span>{prayerData.meta.timezone}</span>
              </motion.div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
