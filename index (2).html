<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Namaz Vakitleri</title>
  <style>
    :root{
      --bg:#020617;--bg2:#0f172a;--card:rgba(15,23,42,.68);--card2:rgba(30,41,59,.72);--line:rgba(148,163,184,.18);--text:#e2e8f0;--muted:#94a3b8;--brand:#38bdf8;--brand2:#6366f1;--ok:#10b981;--warn:#f59e0b;--danger:#ef4444;--white:#fff;
      --shadow:0 20px 60px rgba(2,6,23,.35);
    }
    body.light{
      --bg:#e2e8f0;--bg2:#f8fafc;--card:rgba(255,255,255,.72);--card2:rgba(248,250,252,.86);--line:rgba(15,23,42,.08);--text:#0f172a;--muted:#475569;--shadow:0 20px 60px rgba(15,23,42,.08);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:
      radial-gradient(circle at 15% 10%, rgba(56,189,248,.16), transparent 30%),
      radial-gradient(circle at 85% 90%, rgba(99,102,241,.18), transparent 32%),
      linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);min-height:100%}
    .wrap{max-width:1280px;margin:0 auto;padding:24px}
    .card{background:var(--card);border:1px solid var(--line);backdrop-filter:blur(18px);border-radius:28px;box-shadow:var(--shadow)}
    .row{display:flex;gap:16px;flex-wrap:wrap}
    .between{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
    .muted{color:var(--muted)}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:12px 16px;border-radius:999px;background:var(--card2);border:1px solid var(--line)}
    .btn{appearance:none;border:none;cursor:pointer;border-radius:18px;padding:14px 18px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--brand),#2563eb);box-shadow:0 14px 30px rgba(37,99,235,.22);transition:transform .15s ease,filter .15s ease,opacity .15s ease}
    .btn:hover{filter:brightness(1.05)}
    .btn:active{transform:scale(.98)}
    .btn.secondary{background:var(--card2);color:var(--text);border:1px solid var(--line);box-shadow:none}
    .btn.ghost{background:transparent;border:1px solid var(--line);box-shadow:none;color:var(--text)}
    input{width:100%;padding:16px 18px 16px 48px;border-radius:20px;border:1px solid var(--line);background:var(--card2);color:var(--text);outline:none;font-size:16px}
    input:focus{border-color:rgba(56,189,248,.55);box-shadow:0 0 0 4px rgba(56,189,248,.12)}
    .searchBox{position:relative;flex:1;min-width:260px}
    .searchBox span{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:1.1fr 1fr;gap:24px}
    .hero{position:relative;overflow:hidden;padding:30px}
    .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.28;transition:opacity .5s ease, background-image .5s ease}
    .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg, rgba(2,6,23,.25), rgba(2,6,23,.72))}
    body.light .hero::after{background:linear-gradient(180deg, rgba(255,255,255,.28), rgba(255,255,255,.74))}
    .hero-inner{position:relative;z-index:2}
    .clock{display:flex;align-items:center;justify-content:center;gap:10px;margin:22px 0 12px}
    .clock .unit{min-width:90px;padding:14px 8px;border-radius:22px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);text-align:center}
    body.light .clock .unit{background:rgba(255,255,255,.6);border-color:rgba(15,23,42,.07)}
    .clock .num{font-size: clamp(40px, 8vw, 82px);font-weight:900;line-height:1;font-variant-numeric:tabular-nums}
    .progressWrap{margin-top:18px}
    .labels{display:flex;justify-content:space-between;gap:10px;align-items:center;font-size:14px;margin-bottom:10px}
    .bar{height:38px;border-radius:999px;background:rgba(15,23,42,.35);border:1px solid var(--line);position:relative;overflow:hidden}
    .fill{position:absolute;inset:0 auto 0 0;width:0;background:linear-gradient(90deg,#38bdf8,#6366f1,#f59e0b);border-radius:999px;transition:width 1s linear}
    .sun{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:26px;transition:left 1s linear;filter:drop-shadow(0 0 10px rgba(255,255,255,.25))}
    .prayer-list{padding:22px}
    .prayer-item{position:relative;overflow:hidden;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px;border-radius:22px;border:1px solid var(--line);background:var(--card2);cursor:pointer;transition:transform .18s ease,border-color .18s ease, box-shadow .18s ease}
    .prayer-item:hover{transform:translateY(-2px)}
    .prayer-item.active{border-color:rgba(56,189,248,.58);box-shadow:0 12px 34px rgba(56,189,248,.13)}
    .prayer-left{display:flex;align-items:center;gap:14px;min-width:0}
    .prayer-emoji{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;background:rgba(255,255,255,.08);font-size:26px;border:1px solid var(--line)}
    body.light .prayer-emoji{background:rgba(15,23,42,.04)}
    .time{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums}
    .section{padding:22px}
    .top{padding:22px}
    .small{font-size:13px}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .status{padding:12px 14px;border-radius:18px;border:1px solid var(--line);background:var(--card2)}
    .ok{color:var(--ok)} .danger{color:var(--danger)} .warn{color:var(--warn)}
    .media iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:18px;background:#000}
    .playlist{max-height:330px;overflow:auto;display:grid;gap:10px;margin-top:12px;padding-right:4px}
    .playlist button{display:flex;gap:10px;align-items:center;background:var(--card2);color:var(--text);border:1px solid var(--line);border-radius:16px;padding:10px;cursor:pointer;text-align:left}
    .playlist button.active{border-color:rgba(56,189,248,.55)}
    .playlist img{width:92px;height:56px;object-fit:cover;border-radius:10px}
    .footer{padding:14px 0 28px;text-align:center;color:var(--muted);font-size:13px}
    .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(2,6,23,.72);backdrop-filter:blur(10px);z-index:60}
    .modal.show{display:flex}
    .modal-card{width:min(1120px,100%);max-height:90vh;overflow:auto;background:var(--bg2);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}
    .modal-prayer{position:relative;overflow:hidden;padding:0;min-height:380px}
    .modal-prayer .cover{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.5}
    .modal-prayer .overlay{position:absolute;inset:0;background:linear-gradient(180deg, rgba(2,6,23,.12), rgba(2,6,23,.82))}
    body.light .modal-prayer .overlay{background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.86))}
    .modal-prayer .content{position:relative;z-index:2;padding:28px;display:flex;flex-direction:column;justify-content:flex-end;min-height:380px}
    .modal-header,.modal-actions{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:18px 22px;border-bottom:1px solid var(--line)}
    .modal-actions{border-top:1px solid var(--line);border-bottom:none;justify-content:flex-end}
    .close{appearance:none;border:none;cursor:pointer;border-radius:16px;padding:10px 14px;background:var(--card2);color:var(--text);border:1px solid var(--line)}
    table{width:100%;border-collapse:collapse;min-width:760px}
    th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left}
    th{position:sticky;top:0;background:var(--bg2)}
    .today{background:rgba(56,189,248,.08)}
    .hide{display:none !important}
    .tag{display:inline-flex;padding:7px 10px;border-radius:999px;border:1px solid var(--line);background:var(--card2);font-size:12px;font-weight:700}
    .adhan-frame{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}
    @media (max-width:980px){.grid{grid-template-columns:1fr}.two{grid-template-columns:1fr}.time{font-size:24px}.clock .unit{min-width:72px}}
    @media (max-width:640px){.wrap{padding:14px}.top,.section,.prayer-list,.hero{padding:18px}.clock{gap:6px}.clock .unit{min-width:64px;padding:12px 6px}.clock .num{font-size:38px}.labels{font-size:12px}.pill{padding:10px 12px}.btn{padding:13px 14px}}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="card top between">
      <div class="row" style="align-items:center;gap:14px">
        <div style="width:58px;height:58px;border-radius:20px;display:grid;place-items:center;background:linear-gradient(135deg,#38bdf8,#6366f1);font-size:28px;box-shadow:0 18px 36px rgba(56,189,248,.24)">🕌</div>
        <div>
          <div style="font-size:28px;font-weight:900;letter-spacing:-.02em">Namaz Vakitleri</div>
          <div class="muted">Dünyanın neresinde olursan ol 🌍</div>
        </div>
      </div>
      <div class="row" style="align-items:center">
        <div class="pill"><span id="moonEmoji">🌙</span> <span id="moonText">Ay fazı</span></div>
        <button class="btn secondary" id="temkinBtn">⚙️ Temkin</button>
        <button class="btn secondary" id="notifBtn">🔔 Bildirim</button>
        <button class="btn secondary" id="adhanBtn">🔊 Ezan</button>
        <button class="btn secondary" id="themeBtn">🌗 Tema</button>
      </div>
    </header>

    <section class="card section" style="margin-top:22px">
      <div class="row">
        <div class="searchBox">
          <span>🔎</span>
          <input id="searchInput" placeholder="Örn. İstanbul, Türkiye" />
        </div>
        <button class="btn" id="searchBtn">Ara</button>
        <button class="btn secondary" id="geoBtn">📍 Konumumu Kullan</button>
      </div>
      <div id="message" style="margin-top:14px"></div>
      <div id="locationBadge" class="pill hide" style="margin-top:14px">📌 <span id="locationText"></span></div>
    </section>

    <div id="content" class="grid hide" style="margin-top:22px">
      <div style="display:grid;gap:22px">
        <section class="card hero">
          <div id="heroBg" class="hero-bg"></div>
          <div class="hero-inner">
            <div id="countdownLabel" class="pill" style="font-weight:800;text-transform:uppercase;letter-spacing:.08em"></div>
            <div class="clock">
              <div class="unit"><div class="num" id="hVal">00</div></div>
              <div class="num" style="font-size:54px;opacity:.55">:</div>
              <div class="unit"><div class="num" id="mVal">00</div></div>
              <div class="num" style="font-size:54px;opacity:.55">:</div>
              <div class="unit"><div class="num" id="sVal">00</div></div>
            </div>
            <div class="progressWrap">
              <div class="labels">
                <div id="currentPrayerLabel"></div>
                <div id="nextPrayerLabel"></div>
              </div>
              <div class="bar">
                <div class="fill" id="barFill"></div>
                <div class="sun" id="sunPos">☀️</div>
              </div>
            </div>
            <div class="row" style="margin-top:18px">
              <div class="pill">📅 <span id="gregorianDate"></span></div>
              <div class="pill">🌙 <span id="hijriDate"></span></div>
              <div class="pill">🌍 <span id="timezoneText"></span></div>
            </div>
            <div style="margin-top:18px">
              <button class="btn" id="calendarBtn">📆 Aylık Takvimi Görüntüle</button>
            </div>
          </div>
        </section>

        <section class="card section" id="ramadanSection" style="display:none">
          <div class="between" style="margin-bottom:14px">
            <div style="font-size:20px;font-weight:800">🌙 Ramazan İlahileri & Müzikleri</div>
            <div class="tag">YouTube</div>
          </div>
          <div class="media">
            <iframe id="mainVideo" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
          <div class="playlist" id="playlist"></div>
        </section>
      </div>

      <section class="card prayer-list">
        <div class="between" style="margin-bottom:12px">
          <div>
            <div style="font-size:22px;font-weight:900">Bugünkü Vakitler</div>
            <div class="muted small">Bir vakte tıklayınca detay penceresi açılır.</div>
          </div>
          <div class="tag" id="sourceTag">Kaynak</div>
        </div>
        <div id="prayerList" style="display:grid;gap:14px"></div>
      </section>
    </div>

    <div class="footer" id="footerInfo"></div>
  </div>

  <div class="adhan-frame" id="adhanHost"></div>

  <div class="modal" id="prayerModal">
    <div class="modal-card modal-prayer">
      <div class="cover" id="prayerModalCover"></div>
      <div class="overlay"></div>
      <div class="content">
        <div class="between" style="margin-bottom:16px">
          <div>
            <div id="prayerModalTitle" style="font-size:38px;font-weight:900"></div>
            <div id="prayerModalEmoji" style="font-size:30px"></div>
          </div>
          <button class="close" data-close="prayerModal">Kapat</button>
        </div>
        <div class="card" style="background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.16);padding:22px;max-width:820px">
          <div id="prayerModalVerse" style="font-size:24px;font-weight:700;line-height:1.5"></div>
          <div id="prayerModalHadith" style="margin-top:14px;font-size:19px;color:#bfdbfe"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="calendarModal">
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <div style="font-size:24px;font-weight:900">Aylık Takvim</div>
          <div class="muted" id="calendarLocation"></div>
        </div>
        <button class="close" data-close="calendarModal">Kapat</button>
      </div>
      <div style="padding:18px 22px;overflow:auto;max-height:calc(90vh - 86px)">
        <div id="calendarStatus" class="muted">Yükleniyor...</div>
        <div id="calendarTableWrap"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="temkinModal">
    <div class="modal-card" style="max-width:620px">
      <div class="modal-header">
        <div>
          <div style="font-size:24px;font-weight:900">Temkin Ayarları</div>
          <div class="muted">Dakika olarak fark girebilirsin. Eksi değer de desteklenir.</div>
        </div>
        <button class="close" data-close="temkinModal">Kapat</button>
      </div>
      <div style="padding:22px;display:grid;gap:14px" id="temkinInputs"></div>
      <div class="modal-actions">
        <button class="btn" id="saveTemkinBtn">Kaydet ve Yenile</button>
      </div>
    </div>
  </div>

  <script>
    const state = {
      theme: localStorage.getItem('theme') || 'dark',
      location: null,
      prayerData: null,
      monthlyData: null,
      searchQuery: '',
      currentTime: new Date(),
      notificationPermission: ('Notification' in window) ? Notification.permission : 'denied',
      notifiedPrayers: new Set(),
      isAdhanEnabled: localStorage.getItem('isAdhanEnabled') === 'true',
      lastPlayedPrayer: localStorage.getItem('lastPlayedPrayer') || '',
      selectedPrayer: null,
      monthlyLoadedFor: '',
      imageIndex: 0,
      activeVideoIndex: 0,
      temkin: (() => {
        try { return JSON.parse(localStorage.getItem('temkin') || '{"Imsak":0,"Sunrise":0,"Dhuhr":0,"Asr":0,"Maghrib":0,"Isha":0}'); }
        catch { return {Imsak:0,Sunrise:0,Dhuhr:0,Asr:0,Maghrib:0,Isha:0}; }
      })(),
    };

    const prayers = {
      Imsak: { name:'İmsak', emoji:'🌙✨', verse:'Fecr vakti beyaz iplik siyah iplikten ayırt edilinceye kadar yiyin için. (Bakara, 187)', hadith:'Sahur yapınız, zira sahurda bereket vardır. (Buhârî, Savm 20)', images:['https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&q=80&w=1400','https://images.unsplash.com/photo-1505322022379-7c3353ee6291?auto=format&fit=crop&q=80&w=1400'] },
      Fajr: { name:'Sabah', emoji:'🌅🕊️', verse:'Sabah namazını kılın, çünkü sabah namazında melekler şahitlik eder. (İsrâ, 78)', hadith:'Kim sabah namazını kılarsa, o Allahın güvencesi altındadır. (Müslim, Mesâcid 261)', images:['https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?auto=format&fit=crop&q=80&w=1400','https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&q=80&w=1400'] },
      Sunrise: { name:'Güneş', emoji:'☀️🌄', verse:'Güneş doğarken ve batarken Rabbini hamd ile tespih et. (Tâhâ, 130)', hadith:'Kim sabah namazını cemaatle kılar, sonra güneş doğuncaya kadar oturup Allahı zikrederse... (Tirmizî, Cuma 59)', images:['https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1400','https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&q=80&w=1400'] },
      Dhuhr: { name:'Öğle', emoji:'☀️🕌', verse:'Gündüzün güneş dönüp gölgesi uzadığında namazı kıl. (İsrâ, 78)', hadith:'Öğle namazı, günün ortasında kılınan, gök kapılarının açıldığı bir namazdır. (Tirmizî, Vitir 15)', images:['https://images.unsplash.com/photo-1585036156171-384164a8c675?auto=format&fit=crop&q=80&w=1400','https://images.unsplash.com/photo-1564121211835-e88c852648ab?auto=format&fit=crop&q=80&w=1400'] },
      Asr: { name:'İkindi', emoji:'🌤️🕋', verse:'Namazlara ve bilhassa orta namaza dikkat edin. (Bakara, 238)', hadith:'İkindi namazını terk edenin ameli boşa gider. (Buhârî, Mevâkît 15)', images:['https://images.unsplash.com/photo-1519817650390-64a93db51149?auto=format&fit=crop&q=80&w=1400','https://images.unsplash.com/photo-1542816417-0983c9c9ad53?auto=format&fit=crop&q=80&w=1400'] },
      Maghrib: { name:'Akşam', emoji:'🌇🤲', verse:'Akşam vaktinde Rabbini tespih et. (Rûm, 17)', hadith:'Akşam namazı acele kılınmalıdır. (Ebû Dâvûd, Salât 6)', images:['https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?auto=format&fit=crop&q=80&w=1400','https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&q=80&w=1400'] },
      Isha: { name:'Yatsı', emoji:'🌌📿', verse:'Gecenin bir kısmında Ona secde et ve geceleyin Onu uzun uzun tespih et. (İnsan, 26)', hadith:'Yatsı namazını cemaatle kılan, gecenin yarısını ihya etmiş gibidir. (Müslim, Mesâcid 260)', images:['https://images.unsplash.com/photo-1513628253939-010e64ac66cd?auto=format&fit=crop&q=80&w=1400','https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?auto=format&fit=crop&q=80&w=1400'] },
    };

    const prayerKeys = ['Imsak','Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];
    const prayerKeysWithAdhan = ['Imsak','Fajr','Dhuhr','Asr','Maghrib','Isha'];
    const ramadanVideos = [
      { id:'25cjM4047vc', list:'RD25cjM4047vc', title:'Ramazan İlahileri & Müzikleri 1' },
      { id:'tBbdSzwxqyY', list:'RDEMR8te1sAiXuQZdmoa4rThJw', title:'Ramazan İlahileri & Müzikleri 2' },
      { id:'iBd1r5VOK2c', list:'RDEM6rJK4ToIcQ6dYHUerXhqZg', title:'Ramazan İlahileri & Müzikleri 3' },
      { id:'e2FKXPzsT7E', list:'RDEM1Y7NQHpWWflJxGnhe4cAtQ', title:'Ramazan İlahileri & Müzikleri 4' },
      { id:'u_-McEvEGvI', list:'RDEM6rybi08Zh-3tdKVotIDgdQ', title:'Ramazan İlahileri & Müzikleri 5' },
      { id:'-7LUNVWVHeE', list:'RD-7LUNVWVHeE', title:'Ramazan İlahileri & Müzikleri 6' },
      { id:'XFPeblMoqTw', list:'RDXFPeblMoqTw', title:'Ramazan İlahileri & Müzikleri 7' },
      { id:'clmFgX5LGdg', list:'PL3zmZehhKFxj7xEuuCsLfPbmx_g5cCCl4', title:'Ramazan İlahileri & Müzikleri 8' },
    ];
    const adhanVideos = { Imsak:'JMjQ9n2NuzU', Fajr:'JMjQ9n2NuzU', Dhuhr:'TfewIb0JxEA', Asr:'X1uqKicTuXY', Maghrib:'XoJEDT0J3Uc', Isha:'zeYwVacb7K4' };

    const $ = sel => document.querySelector(sel);
    const fmt2 = v => String(v).padStart(2,'0');
    const sameDayKey = () => state.prayerData?.date?.gregorian?.date || '';

    function setMessage(text = '', type = 'info') {
      const el = $('#message');
      if (!text) { el.innerHTML = ''; return; }
      const cls = type === 'error' ? 'danger' : type === 'success' ? 'ok' : 'warn';
      el.innerHTML = `<div class="status ${cls}">${text}</div>`;
    }

    function applyTheme() {
      document.body.classList.toggle('light', state.theme === 'light');
      $('#adhanBtn').textContent = state.isAdhanEnabled ? '🔊 Ezan Açık' : '🔈 Ezan Kapalı';
      $('#notifBtn').textContent = state.notificationPermission === 'granted' ? '🔔 Bildirim Açık' : '🔕 Bildirim';
    }

    function getMoonPhase(date) {
      let year = date.getFullYear(); let month = date.getMonth() + 1; let day = date.getDate();
      if (month < 3) { year--; month += 12; }
      ++month;
      let c = 365.25 * year; let e = 30.6 * month; let jd = c + e + day - 694039.09;
      jd /= 29.5305882; let b = Math.floor(jd); jd -= b; let b2 = Math.round(jd * 8); if (b2 >= 8) b2 = 0;
      const phases = [ ['Yeni Ay','🌑'], ['Hilal','🌒'], ['İlk Dördün','🌓'], ['Şişkin Ay','🌔'], ['Dolunay','🌕'], ['Küçülen Şişkin','🌖'], ['Son Dördün','🌗'], ['Küçülen Hilal','🌘'] ];
      return { text: phases[b2][0], emoji: phases[b2][1] };
    }

    function applyTemkin(timeStr, minutes) {
      if (!timeStr) return '--:--';
      const clean = String(timeStr).split(' ')[0].slice(0,5);
      const [h,m] = clean.split(':').map(Number);
      if (Number.isNaN(h) || Number.isNaN(m) || !minutes) return clean;
      const d = new Date();
      d.setHours(h, m + minutes, 0, 0);
      return `${fmt2(d.getHours())}:${fmt2(d.getMinutes())}`;
    }

    function updateLocationBadge() {
      if (!state.location) { $('#locationBadge').classList.add('hide'); return; }
      $('#locationBadge').classList.remove('hide');
      $('#locationText').textContent = state.location.name;
    }

    function normalizeLocationName(parts, fallbackCountry='Türkiye') {
      const city = parts.city || parts.town || parts.village || parts.state_district || parts.county || parts.state || parts.country || 'Konum';
      const country = parts.country || fallbackCountry;
      return `${city}, ${country}`;
    }

    async function reverseGeocode(lat, lon) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=tr`);
        const data = await res.json();
        return normalizeLocationName(data.address || {}, 'Dünya');
      } catch {
        return `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
      }
    }

    function buildTuneString() {
      const t = state.temkin;
      return [t.Imsak,t.Imsak,t.Sunrise,t.Dhuhr,t.Asr,t.Maghrib,t.Isha,0,0].join(',');
    }

    async function fetchPrayerTimesByCoords(lat, lon, locationName) {
      setMessage('Vakitler alınıyor...', 'warn');
      const tune = buildTuneString();
      const url = `https://api.aladhan.com/v1/timings/${Math.floor(Date.now()/1000)}?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lon)}&method=13&school=1&midnightMode=1&tune=${encodeURIComponent(tune)}`;
      const res = await fetch(url);
      const json = await res.json();
      if (json.code !== 200 || !json.data) throw new Error('Aladhan verisi alınamadı');
      const data = json.data;
      const finalTimings = {};
      prayerKeys.forEach(key => {
        let sourceKey = key;
        if (key === 'Imsak') sourceKey = 'Imsak';
        finalTimings[key] = String(data.timings[sourceKey] || '--:--').split(' ')[0].slice(0,5);
      });
      if (finalTimings.Fajr === '--:--') finalTimings.Fajr = finalTimings.Imsak;
      data.timings = finalTimings;
      data.meta = data.meta || {};
      data.meta.source = 'AlAdhan API';
      state.prayerData = data;
      state.location = { lat, lon, name: locationName || `${lat.toFixed(4)}, ${lon.toFixed(4)}` };
      localStorage.setItem('lastLocation', JSON.stringify(state.location));
      setMessage('Vakitler başarıyla güncellendi.', 'success');
      renderAll();
    }

    async function handleSearch() {
      const q = $('#searchInput').value.trim();
      if (!q) return;
      state.searchQuery = q;
      setMessage('Konum aranıyor...', 'warn');
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&accept-language=tr`);
        const data = await res.json();
        if (!Array.isArray(data) || !data.length) throw new Error('Konum bulunamadı');
        const item = data[0];
        const lat = parseFloat(item.lat), lon = parseFloat(item.lon);
        const parts = item.address || {};
        const name = normalizeLocationName(parts, (item.display_name || '').split(',').slice(-1)[0]?.trim() || 'Dünya');
        await fetchPrayerTimesByCoords(lat, lon, name);
      } catch (err) {
        setMessage('Konum bulunamadı. Yazımı kontrol edip yeniden deneyin.', 'error');
      }
    }

    async function handleAutoLocation() {
      if (!navigator.geolocation) { setMessage('Tarayıcınız konum özelliğini desteklemiyor.', 'error'); return; }
      setMessage('Konum alınıyor...', 'warn');
      navigator.geolocation.getCurrentPosition(async pos => {
        try {
          const lat = pos.coords.latitude, lon = pos.coords.longitude;
          const name = await reverseGeocode(lat, lon);
          await fetchPrayerTimesByCoords(lat, lon, name);
        } catch {
          setMessage('Konum bulundu ama vakitler alınamadı. İnternet bağlantınızı veya API erişimini kontrol edin.', 'error');
        }
      }, () => setMessage('Konum bulunamadı veya izin verilmedi.', 'error'), { timeout: 12000, maximumAge: 60000, enableHighAccuracy: true });
    }

    function getPrayerTimeline() {
      if (!state.prayerData) return null;
      const tz = state.prayerData.meta?.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
      const now = new Date(state.currentTime.toLocaleString('en-US', { timeZone: tz }));
      const list = prayerKeys.map(key => {
        const [hh,mm] = state.prayerData.timings[key].split(':').map(Number);
        const d = new Date(now); d.setHours(hh,mm,0,0);
        return { key, time: state.prayerData.timings[key], date: d };
      });
      let nextPrayer = null, currentPrayer = null;
      for (let i=0;i<list.length;i++) {
        if (list[i].date.getTime() > now.getTime()) {
          nextPrayer = list[i]; currentPrayer = i > 0 ? list[i-1] : list[list.length-1]; break;
        }
      }
      if (!nextPrayer) { const imsak = new Date(list[0].date); imsak.setDate(imsak.getDate()+1); nextPrayer = { ...list[0], date: imsak }; currentPrayer = list[list.length-1]; }
      const diffMs = nextPrayer.date.getTime() - now.getTime();
      const hrs = Math.floor(diffMs / 3600000), mins = Math.floor((diffMs % 3600000)/60000), secs = Math.floor((diffMs%60000)/1000);
      const totalMs = nextPrayer.date.getTime() - currentPrayer.date.getTime();
      const elapsedMs = now.getTime() - currentPrayer.date.getTime();
      const progress = Math.max(0, Math.min(100, totalMs ? (elapsedMs/totalMs)*100 : 0));
      return { now, nextPrayer, currentPrayer, hrs, mins, secs, progress, tz };
    }

    function renderMoon() {
      const moon = getMoonPhase(state.currentTime);
      $('#moonEmoji').textContent = moon.emoji;
      $('#moonText').textContent = moon.text + (state.location ? ` • ${state.location.name.split(',')[0]}` : '');
    }

    function renderHeaderControls() {
      $('#adhanBtn').textContent = state.isAdhanEnabled ? '🔊 Ezan Açık' : '🔈 Ezan Kapalı';
      $('#notifBtn').textContent = state.notificationPermission === 'granted' ? '🔔 Bildirim Açık' : '🔕 Bildirim';
    }

    function renderHero() {
      const tl = getPrayerTimeline();
      if (!state.prayerData || !tl) { $('#content').classList.add('hide'); $('#footerInfo').textContent=''; return; }
      $('#content').classList.remove('hide');
      const isRamadan = state.prayerData.date?.hijri?.month?.number === 9;
      const nextName = prayers[tl.nextPrayer.key]?.name || tl.nextPrayer.key;
      const currentName = prayers[tl.currentPrayer.key]?.name || tl.currentPrayer.key;
      let label = `${nextName} vaktine kalan süre`;
      if (isRamadan && tl.nextPrayer.key === 'Maghrib') label = '🌙 İftara kalan süre';
      if (isRamadan && tl.nextPrayer.key === 'Imsak') label = '🌙 Sahura kalan süre';
      $('#countdownLabel').textContent = label;
      $('#hVal').textContent = fmt2(tl.hrs); $('#mVal').textContent = fmt2(tl.mins); $('#sVal').textContent = fmt2(tl.secs);
      $('#currentPrayerLabel').innerHTML = `${prayers[tl.currentPrayer.key].emoji.split('')[0]} ${currentName} (${tl.currentPrayer.time})`;
      $('#nextPrayerLabel').innerHTML = `${nextName} (${tl.nextPrayer.time}) ${prayers[tl.nextPrayer.key].emoji.split('')[0]}`;
      $('#barFill').style.width = tl.progress + '%';
      $('#sunPos').style.left = `calc(${tl.progress}% - 0px)`;
      $('#sunPos').textContent = ['Maghrib','Isha','Imsak'].includes(tl.currentPrayer.key) ? '🌙' : '☀️';
      const imgArr = prayers[tl.currentPrayer.key]?.images || prayers.Fajr.images;
      $('#heroBg').style.backgroundImage = `url('${imgArr[state.imageIndex % imgArr.length]}')`;
      $('#gregorianDate').textContent = state.prayerData.date?.readable || '';
      $('#hijriDate').textContent = `${state.prayerData.date?.hijri?.day || ''} ${state.prayerData.date?.hijri?.month?.tr || state.prayerData.date?.hijri?.month?.en || ''}`.trim();
      $('#timezoneText').textContent = tl.tz;
      $('#sourceTag').textContent = `Kaynak: ${state.prayerData.meta?.source || 'AlAdhan API'}`;
      $('#footerInfo').textContent = `Kaynak: ${state.prayerData.meta?.source || 'AlAdhan API'} • ${tl.tz} • Yusuf TEKMIL tarafından yapılmıştır.`;
      renderRamadan(isRamadan);
    }

    function renderPrayerList() {
      if (!state.prayerData) return;
      const tl = getPrayerTimeline();
      const list = $('#prayerList');
      list.innerHTML = '';
      prayerKeys.forEach(key => {
        const item = document.createElement('div');
        item.className = 'prayer-item' + (tl?.nextPrayer?.key === key ? ' active' : '');
        item.innerHTML = `
          <div class="prayer-left">
            <div class="prayer-emoji">${prayers[key].emoji}</div>
            <div>
              <div style="font-size:22px;font-weight:800">${prayers[key].name}</div>
              <div class="muted small">Detayı aç</div>
            </div>
          </div>
          <div class="time">${state.prayerData.timings[key]}</div>`;
        item.addEventListener('click', () => openPrayerModal(key));
        list.appendChild(item);
      });
    }

    function renderRamadan(isRamadan) {
      const sec = $('#ramadanSection');
      if (!isRamadan) { sec.style.display='none'; return; }
      sec.style.display='block';
      const current = ramadanVideos[state.activeVideoIndex];
      $('#mainVideo').src = `https://www.youtube.com/embed/${current.id}?list=${current.list}`;
      const playlist = $('#playlist'); playlist.innerHTML='';
      ramadanVideos.forEach((v,i) => {
        const btn = document.createElement('button');
        btn.className = i === state.activeVideoIndex ? 'active' : '';
        btn.innerHTML = `<img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt=""><div><div style="font-weight:800">${v.title}</div><div class="muted small">Oynatmak için tıkla</div></div>`;
        btn.addEventListener('click', ()=>{ state.activeVideoIndex=i; renderRamadan(true); });
        playlist.appendChild(btn);
      });
    }

    function openPrayerModal(key) {
      state.selectedPrayer = key;
      const p = prayers[key];
      $('#prayerModalTitle').textContent = p.name;
      $('#prayerModalEmoji').textContent = p.emoji;
      $('#prayerModalVerse').textContent = `“${p.verse}”`;
      $('#prayerModalHadith').textContent = `✨ ${p.hadith}`;
      $('#prayerModalCover').style.backgroundImage = `url('${p.images[0]}')`;
      $('#prayerModal').classList.add('show');
    }

    function closeModal(id) { $('#' + id).classList.remove('show'); }

    async function openCalendarModal() {
      if (!state.location) return;
      $('#calendarLocation').textContent = state.location.name;
      $('#calendarStatus').textContent = 'Aylık takvim yükleniyor...';
      $('#calendarTableWrap').innerHTML = '';
      $('#calendarModal').classList.add('show');
      try {
        const now = new Date();
        const year = now.getFullYear(), month = now.getMonth()+1;
        const tune = buildTuneString();
        const url = `https://api.aladhan.com/v1/calendar/${year}/${month}?latitude=${encodeURIComponent(state.location.lat)}&longitude=${encodeURIComponent(state.location.lon)}&method=13&school=1&midnightMode=1&tune=${encodeURIComponent(tune)}`;
        const res = await fetch(url);
        const json = await res.json();
        if (json.code !== 200 || !json.data) throw new Error('Takvim alınamadı');
        state.monthlyData = json.data.map(day => ({
          ...day,
          timings: Object.fromEntries(prayerKeys.map(k => [k, String(day.timings[k] || (k === 'Fajr' ? day.timings.Imsak : '--:--')).split(' ')[0].slice(0,5)]))
        }));
        renderCalendarTable();
      } catch {
        $('#calendarStatus').textContent = 'Takvim alınamadı. Lütfen biraz sonra yeniden deneyin.';
      }
    }

    function renderCalendarTable() {
      if (!state.monthlyData) return;
      const todayKey = new Date().toLocaleDateString('en-GB').replace(/\//g,'-');
      const rows = state.monthlyData.map(day => {
        const isToday = day.date?.gregorian?.date === todayKey ? 'today' : '';
        return `<tr class="${isToday}">
          <td><div style="font-weight:800">${day.date.readable}</div><div class="muted small">${day.date.hijri.day} ${day.date.hijri.month.tr || day.date.hijri.month.en} ${day.date.hijri.year}</div></td>
          <td>${day.timings.Imsak}</td><td>${day.timings.Sunrise}</td><td>${day.timings.Dhuhr}</td><td>${day.timings.Asr}</td><td>${day.timings.Maghrib}</td><td>${day.timings.Isha}</td>
        </tr>`;
      }).join('');
      $('#calendarStatus').textContent = '';
      $('#calendarTableWrap').innerHTML = `<table><thead><tr><th>Tarih</th><th>İmsak</th><th>Güneş</th><th>Öğle</th><th>İkindi</th><th>Akşam</th><th>Yatsı</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    function openTemkinModal() {
      const wrap = $('#temkinInputs');
      wrap.innerHTML = '';
      ['Imsak','Sunrise','Dhuhr','Asr','Maghrib','Isha'].forEach(key => {
        const row = document.createElement('div');
        row.className = 'between status';
        row.innerHTML = `<div style="font-weight:800">${prayers[key]?.name || key}</div><input data-temkin="${key}" type="number" value="${state.temkin[key] ?? 0}" style="max-width:140px;padding-left:16px">`;
        wrap.appendChild(row);
      });
      $('#temkinModal').classList.add('show');
    }

    async function requestNotifications() {
      if (!('Notification' in window)) { setMessage('Tarayıcınız bildirimleri desteklemiyor.', 'error'); return; }
      try { state.notificationPermission = await Notification.requestPermission(); renderHeaderControls(); }
      catch { setMessage('Bildirim izni alınamadı.', 'error'); }
    }

    function maybeNotifyPrayer() {
      const tl = getPrayerTimeline();
      if (!tl || state.notificationPermission !== 'granted') return;
      prayerKeys.forEach(key => {
        const [hh,mm] = state.prayerData.timings[key].split(':').map(Number);
        const notifKey = `${sameDayKey()}-${key}`;
        if (tl.now.getHours() === hh && tl.now.getMinutes() === mm && tl.now.getSeconds() === 0 && !state.notifiedPrayers.has(notifKey)) {
          new Notification('Namaz Vakti!', { body: `${prayers[key].name} vakti girdi. Namazını kılmayı unutma.`, icon:'https://cdn-icons-png.flaticon.com/512/3073/3073986.png' });
          state.notifiedPrayers.add(notifKey);
        }
      });
    }

    function maybePlayAdhan() {
      if (!state.prayerData || !state.isAdhanEnabled) return;
      const tl = getPrayerTimeline();
      if (!tl) return;
      for (const key of prayerKeysWithAdhan) {
        const [hh,mm] = state.prayerData.timings[key].split(':').map(Number);
        const prayerId = `${sameDayKey()}-${key}`;
        if (tl.now.getHours() === hh && tl.now.getMinutes() === mm && state.lastPlayedPrayer !== prayerId) {
          const isRamadan = state.prayerData.date?.hijri?.month?.number === 9;
          let vid = adhanVideos[key];
          if (key === 'Maghrib' && isRamadan) vid = '3zkrwt8PEgQ';
          const host = $('#adhanHost');
          host.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1&controls=0&showinfo=0&rel=0" allow="autoplay" title="Adhan"></iframe>`;
          state.lastPlayedPrayer = prayerId;
          localStorage.setItem('lastPlayedPrayer', prayerId);
          setTimeout(() => { host.innerHTML=''; }, 360000);
          break;
        }
      }
    }

    function saveTemkin() {
      document.querySelectorAll('[data-temkin]').forEach(inp => {
        const key = inp.getAttribute('data-temkin');
        state.temkin[key] = parseInt(inp.value,10) || 0;
      });
      localStorage.setItem('temkin', JSON.stringify(state.temkin));
      closeModal('temkinModal');
      if (state.location) fetchPrayerTimesByCoords(state.location.lat, state.location.lon, state.location.name);
    }

    function renderAll() {
      renderMoon();
      updateLocationBadge();
      renderHeaderControls();
      renderHero();
      renderPrayerList();
    }

    function bindEvents() {
      $('#searchBtn').addEventListener('click', handleSearch);
      $('#searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleSearch(); });
      $('#geoBtn').addEventListener('click', handleAutoLocation);
      $('#themeBtn').addEventListener('click', () => { state.theme = state.theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('theme', state.theme); applyTheme(); renderAll(); });
      $('#notifBtn').addEventListener('click', requestNotifications);
      $('#adhanBtn').addEventListener('click', () => { state.isAdhanEnabled = !state.isAdhanEnabled; localStorage.setItem('isAdhanEnabled', String(state.isAdhanEnabled)); renderHeaderControls(); });
      $('#calendarBtn').addEventListener('click', openCalendarModal);
      $('#temkinBtn').addEventListener('click', openTemkinModal);
      $('#saveTemkinBtn').addEventListener('click', saveTemkin);
      document.querySelectorAll('[data-close]').forEach(btn => btn.addEventListener('click', e => closeModal(e.currentTarget.getAttribute('data-close'))));
      document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.remove('show'); }));
    }

    async function bootstrap() {
      applyTheme();
      bindEvents();
      renderMoon();
      const saved = localStorage.getItem('lastLocation');
      if (saved) {
        try {
          const loc = JSON.parse(saved);
          await fetchPrayerTimesByCoords(loc.lat, loc.lon, loc.name);
        } catch {}
      }
      setInterval(() => {
        state.currentTime = new Date();
        state.imageIndex = (state.imageIndex + 1) % 2;
        renderMoon();
        renderHero();
        maybeNotifyPrayer();
        maybePlayAdhan();
      }, 1000);
    }

    bootstrap();
  </script>
</body>
</html>
